<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="description" content="NEXUS ARCHITECT v4.0 GENERATED CONTENT">
    <title>CYBER // DRIFT [High-Performance Engine]</title>
    <style>
        /* INDUSTRIAL UI RESET */
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff0055;
            --neon-gold: #ffe600;
            --bg-color: #050505;
            --font-main: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            touch-action: none; /* Prevents default mobile scrolling */
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: var(--font-main);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* HUD LAYER */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            color: var(--neon-blue);
            font-weight: bold;
            letter-spacing: 2px;
        }

        .hud-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
        }

        h1 {
            font-size: 3rem;
            color: #fff;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px var(--neon-pink);
            letter-spacing: -2px;
            animation: glitch 1s infinite alternate;
        }

        .btn {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px 40px;
            font-size: 1.2rem;
            margin-top: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.8);
        }

        .hidden { opacity: 0; pointer-events: none; }

        @keyframes glitch {
            0% { text-shadow: 4px 4px 0px var(--neon-pink); }
            50% { text-shadow: -4px -4px 0px var(--neon-gold); }
            100% { text-shadow: 4px -4px 0px var(--neon-blue); }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            .hud-top {
                font-size: 1rem;
            }
            .btn {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- RENDER TARGET -->
    <canvas id="game-canvas"></canvas>

    <!-- UI OVERLAY -->
    <div id="ui-layer">
        <div class="hud-top">
            <div id="score-display">SCORE: 0000</div>
            <div id="speed-display">SPD: 100%</div>
        </div>
        
        <div id="menu-screen" class="hud-center">
            <h1>CYBER // DRIFT</h1>
            <p style="color: #aaa; margin-bottom: 30px;">[ TAP / MOUSE to Steer ]</p>
            <button class="btn" id="start-btn">INITIALIZE</button>
        </div>

        <div id="game-over-screen" class="hud-center hidden">
            <h1 style="color: var(--neon-pink)">CRITICAL FAILURE</h1>
            <p id="final-score" style="color: #fff; font-size: 1.5rem; margin: 20px 0;">SCORE: 0</p>
            <button class="btn" id="restart-btn">REBOOT SYSTEM</button>
        </div>
    </div>

    <script>
        /**
         * NEXUS ARCHITECT v4.0
         * Core Engine: Canvas 2.5D Projection
         * Optimization: Object Pooling, Dirty Rect (Full Clear), FSM
         */

        // --- MATH UTILS ---
        const MathUtils = {
            lerp: (a, b, t) => a + (b - a) * t,
            clamp: (num, min, max) => Math.min(Math.max(num, min), max),
            randRange: (min, max) => Math.random() * (max - min) + min,
            toRad: (deg) => deg * (Math.PI / 180)
        };

        // --- ENGINE CONFIGURATION ---
        const CONFIG = {
            fov: 300,            // Field of view for projection
            gridSpeed: 0,        // Dynamic
            baseSpeed: 1000,
            maxSpeed: 3000,
            laneWidth: 400,
            colors: {
                bg: '#050505',
                grid: '#1a1a2e',
                player: '#00f3ff',
                enemy: '#ff0055',
                particle: '#ffe600'
            }
        };

        // --- OBJECT POOLING SYSTEM (Memory Optimization) ---
        class Pool {
            constructor(createFn, maxSize = 100) {
                this.pool = [];
                this.createFn = createFn;
                for (let i = 0; i < maxSize; i++) {
                    this.pool.push(this.createFn());
                }
            }
            get() {
                return this.pool.length > 0 ? this.pool.pop() : this.createFn();
            }
            release(obj) {
                this.pool.push(obj);
            }
        }

        // --- INPUT SYSTEM (Cross-Platform) ---
        class InputHandler {
            constructor() {
                this.x = 0; // Normalized -1 to 1
                this.active = false;
                this.targetX = 0;
                
                const onMove = (clientX, width) => {
                    const center = width / 2;
                    // Calculate normalized position (-1 to 1) based on screen center
                    this.targetX = (clientX - center) / (center * 0.8); 
                    this.targetX = MathUtils.clamp(this.targetX, -1.2, 1.2);
                };

                // Mouse
                window.addEventListener('mousemove', e => onMove(e.clientX, window.innerWidth));
                
                // Touch
                window.addEventListener('touchmove', e => {
                    e.preventDefault(); // Prevent scroll
                    onMove(e.touches[0].clientX, window.innerWidth);
                }, { passive: false });
                
                // Keyboard Fallback
                window.addEventListener('keydown', e => {
                    if (e.key === 'ArrowLeft') this.targetX = -0.8;
                    if (e.key === 'ArrowRight') this.targetX = 0.8;
                });
                window.addEventListener('keyup', e => this.targetX = 0);
            }

            update(dt) {
                // Smooth input interpolation
                this.x = MathUtils.lerp(this.x, this.targetX, dt * 8);
            }
        }

        // --- ENTITIES ---

        class Particle {
            constructor() {
                this.reset();
            }
            reset(x = 0, y = 0, z = 0, color = '#fff') {
                this.x = x; this.y = y; this.z = z;
                this.vx = MathUtils.randRange(-50, 50);
                this.vy = MathUtils.randRange(-50, 50);
                this.vz = MathUtils.randRange(10, 50);
                this.life = 1.0;
                this.color = color;
                this.active = true;
            }
            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.z -= this.vz * dt; // Move towards camera
                this.life -= dt * 1.5;
                if (this.life <= 0 || this.z < 1) this.active = false;
            }
        }

        class Enemy {
            constructor() {
                this.active = false;
            }
            spawn(zDistance) {
                this.x = MathUtils.randRange(-CONFIG.laneWidth, CONFIG.laneWidth);
                this.y = 0; // On floor
                this.z = zDistance;
                this.width = 100;
                this.height = 100;
                this.active = true;
                // Oscillating movement
                this.offset = Math.random() * 100;
                this.speedMod = Math.random() * 2 + 1;
            }
            update(dt, speed) {
                this.z -= speed * dt;
                // Subtle side movement
                this.x += Math.sin((Date.now() / 500) * this.speedMod + this.offset) * 2;
                if (this.z < -100) this.active = false;
            }
        }

        // --- CORE ENGINE ---

        class Game {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d', { alpha: false, desynchronized: true });
                this.input = new InputHandler();
                
                this.resize();
                window.addEventListener('resize', () => this.resize());

                // State
                this.state = 'MENU'; // MENU, PLAYING, GAMEOVER
                this.score = 0;
                this.speed = CONFIG.baseSpeed;
                this.distance = 0;
                
                // Entities
                this.player = { x: 0, z: 200, width: 40 };
                this.enemies = [];
                this.particles = [];
                
                // Pools
                this.enemyPool = new Pool(() => new Enemy(), 20);
                this.particlePool = new Pool(() => new Particle(), 100);

                // Timing
                this.lastTime = 0;
                this.spawnTimer = 0;

                // Bind UI
                this.bindUI();

                // Start Loop
                requestAnimationFrame(t => this.loop(t));
            }

            bindUI() {
                const startBtn = document.getElementById('start-btn');
                const restartBtn = document.getElementById('restart-btn');
                
                startBtn.addEventListener('click', () => this.start());
                restartBtn.addEventListener('click', () => this.start());
            }

            resize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.canvas.width = this.width;
                this.canvas.height = this.height;
                this.cx = this.width / 2;
                this.cy = this.height / 2;
            }

            start() {
                this.state = 'PLAYING';
                this.score = 0;
                this.speed = CONFIG.baseSpeed;
                this.distance = 0;
                this.enemies.forEach(e => e.active = false); // Clear field
                this.enemies = [];
                this.particles = [];
                
                document.getElementById('menu-screen').classList.add('hidden');
                document.getElementById('game-over-screen').classList.add('hidden');
            }

            gameOver() {
                this.state = 'GAMEOVER';
                // Explosion effect
                for(let i=0; i<30; i++) {
                    this.spawnParticle(this.player.x, 0, this.player.z, CONFIG.colors.player);
                }
                document.getElementById('final-score').innerText = `SCORE: ${Math.floor(this.score)}`;
                document.getElementById('game-over-screen').classList.remove('hidden');
            }

            spawnParticle(x, y, z, color) {
                const p = this.particlePool.get();
                p.reset(x, y, z, color);
                this.particles.push(p);
            }

            spawnEnemy() {
                const e = this.enemyPool.get();
                e.spawn(5000 + this.distance); // Spawn far away
                this.enemies.push(e);
            }

            // --- PROJECTION MATH (3D -> 2D) ---
            project(x, y, z) {
                if (z <= 0) return null;
                const scale = CONFIG.fov / z;
                return {
                    x: this.cx + (x * scale),
                    y: this.cy - 100 + (y * scale), // -100 adjusts horizon height
                    scale: scale
                };
            }

            update(dt) {
                if (this.state !== 'PLAYING') return;

                // Difficulty scaling
                this.speed += dt * 50; 
                this.speed = Math.min(this.speed, CONFIG.maxSpeed);
                this.distance += this.speed * dt;
                this.score += (this.speed * dt) / 100;

                // Update UI
                document.getElementById('score-display').innerText = `SCORE: ${Math.floor(this.score).toString().padStart(5, '0')}`;
                document.getElementById('speed-display').innerText = `SPD: ${Math.floor((this.speed / CONFIG.baseSpeed) * 100)}%`;

                // Player Movement
                this.input.update(dt);
                this.player.x = this.input.x * (CONFIG.laneWidth * 1.5);

                // Spawn Enemies
                this.spawnTimer -= dt;
                if (this.spawnTimer <= 0) {
                    this.spawnEnemy();
                    // Spawn rate increases with speed
                    this.spawnTimer = MathUtils.lerp(1.5, 0.4, (this.speed - CONFIG.baseSpeed) / (CONFIG.maxSpeed - CONFIG.baseSpeed));
                }

                // Update Enemies & Collision
                for (let i = this.enemies.length - 1; i >= 0; i--) {
                    const e = this.enemies[i];
                    e.update(dt, this.speed);

                    // Simple Collision Box logic in 3D space
                    if (e.z < this.player.z + 50 && e.z > this.player.z - 50) {
                        if (Math.abs(e.x - this.player.x) < 80) {
                            this.gameOver();
                        }
                    }

                    if (!e.active) {
                        this.enemyPool.release(e);
                        this.enemies.splice(i, 1);
                    }
                }

                // Update Particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.update(dt);
                    p.z -= this.speed * dt; // Particles move with world
                    if (!p.active) {
                        this.particlePool.release(p);
                        this.particles.splice(i, 1);
                    }
                }
                
                // Trail generation
                if (Math.random() > 0.5) {
                    this.spawnParticle(this.player.x + MathUtils.randRange(-20, 20), 0, this.player.z + 50, CONFIG.colors.player);
                }
            }

            draw() {
                // Clear & Background
                this.ctx.fillStyle = CONFIG.colors.bg;
                this.ctx.fillRect(0, 0, this.width, this.height);

                // --- 1. THE GRID (Retro Floor) ---
                this.ctx.strokeStyle = CONFIG.colors.grid;
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                
                // Vertical Lines
                for (let x = -2000; x <= 2000; x += 200) {
                    const p1 = this.project(x, -200, 10);
                    const p2 = this.project(x, -200, 5000);
                    if (p1 && p2) {
                        this.ctx.moveTo(p1.x, p1.y);
                        this.ctx.lineTo(p2.x, p2.y);
                    }
                }

                // Horizontal Lines (Moving)
                const offset = this.distance % 400;
                for (let z = 100; z < 5000; z += 400) {
                    const actualZ = z - offset;
                    if (actualZ < 10) continue;
                    const p1 = this.project(-2000, -200, actualZ);
                    const p2 = this.project(2000, -200, actualZ);
                    if (p1 && p2) {
                        this.ctx.moveTo(p1.x, p1.y);
                        this.ctx.lineTo(p2.x, p2.y);
                    }
                }
                this.ctx.stroke();

                // Glow Effect Setup
                this.ctx.globalCompositeOperation = 'lighter';

                // --- 2. PARTICLES ---
                this.particles.forEach(p => {
                    const pos = this.project(p.x, p.y, p.z);
                    if (pos) {
                        const size = 10 * pos.scale * p.life;
                        this.ctx.fillStyle = p.color;
                        this.ctx.globalAlpha = p.life;
                        this.ctx.beginPath();
                        this.ctx.arc(pos.x, pos.y, size, 0, Math.PI*2);
                        this.ctx.fill();
                    }
                });
                this.ctx.globalAlpha = 1.0;

                // --- 3. ENEMIES ---
                this.enemies.forEach(e => {
                    const pos = this.project(e.x, e.y, e.z);
                    if (pos) {
                        const size = 150 * pos.scale;
                        this.ctx.fillStyle = CONFIG.colors.enemy;
                        this.ctx.shadowBlur = 20;
                        this.ctx.shadowColor = CONFIG.colors.enemy;
                        
                        // Draw Pyramid/Diamond Shape
                        this.ctx.beginPath();
                        this.ctx.moveTo(pos.x, pos.y - size);
                        this.ctx.lineTo(pos.x - size/2, pos.y);
                        this.ctx.lineTo(pos.x + size/2, pos.y);
                        this.ctx.closePath();
                        this.ctx.fill();
                        this.ctx.shadowBlur = 0;
                    }
                });

                // --- 4. PLAYER ---
                if (this.state !== 'GAMEOVER') {
                    const pPos = this.project(this.player.x, 0, this.player.z);
                    if (pPos) {
                        const size = 60;
                        this.ctx.fillStyle = CONFIG.colors.player;
                        this.ctx.shadowBlur = 30;
                        this.ctx.shadowColor = CONFIG.colors.player;
                        
                        // Futuristic Ship Shape
                        this.ctx.beginPath();
                        this.ctx.moveTo(pPos.x, pPos.y - size/2); // Tip
                        this.ctx.lineTo(pPos.x - size, pPos.y + size/2); // Left
                        this.ctx.lineTo(pPos.x, pPos.y + size/4); // Indent
                        this.ctx.lineTo(pPos.x + size, pPos.y + size/2); // Right
                        this.ctx.closePath();
                        this.ctx.fill();
                        
                        // Engine Glow
                        this.ctx.fillStyle = '#fff';
                        this.ctx.beginPath();
                        this.ctx.arc(pPos.x, pPos.y + size/3, 5, 0, Math.PI*2);
                        this.ctx.fill();
                        
                        this.ctx.shadowBlur = 0;
                    }
                }

                this.ctx.globalCompositeOperation = 'source-over';
            }

            loop(timestamp) {
                const dt = Math.min((timestamp - this.lastTime) / 1000, 0.1); // Cap dt
                this.lastTime = timestamp;

                this.update(dt);
                this.draw();

                requestAnimationFrame(t => this.loop(t));
            }
        }

        // --- BOOTSTRAP ---
        window.onload = () => {
            new Game();
        };

    </script>
</body>
</html>
