<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface IA - Projet Nexus</title>
    <style>
        :root {
            --core-color: #00d4ff;
            --bg-color: #050505;
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Le Noyau de l'IA (Animation Organique) */
        .ia-core-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 50px;
        }

        .ia-core {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, var(--core-color) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(20px);
            animation: pulse 4s infinite ease-in-out;
            opacity: 0.8;
        }

        .ia-ring {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid var(--core-color);
            border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            animation: rotate 10s infinite linear;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.9; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Zone de dialogue */
        .chat-container {
            width: 80%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .output-text {
            font-size: 1.1rem;
            line-height: 1.6;
            min-height: 50px;
            margin-bottom: 20px;
            border-left: 3px solid var(--core-color);
            padding-left: 15px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px;
            border-radius: 5px;
            outline: none;
        }

        button {
            background: var(--core-color);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 15px var(--core-color);
        }
    </style>
</head>
<body>

    <div class="ia-core-container">
        <div class="ia-core"></div>
        <div class="ia-ring"></div>
        <div class="ia-ring" style="animation-duration: 15s; border-color: rgba(255,255,255,0.3);"></div>
    </div>

    <div class="chat-container">
        <div class="output-text" id="ai-response">
            Système initialisé. Je suis prête à explorer vos concepts.
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Entrez une commande ou une idée...">
            <button onclick="processInput()">Envoyer</button>
        </div>
    </div>

    <script>
        function processInput() {
            const input = document.getElementById('user-input');
            const responseArea = document.getElementById('ai-response');
            
            if(input.value.trim() !== "") {
                responseArea.innerText = "Analyse en cours : '" + input.value + "'... Connexion aux modules créatifs établie.";
                input.value = "";
            }
        }
    </script>

</body>
</html>
