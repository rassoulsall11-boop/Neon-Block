<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Neon Pulse</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        .apex-ring {
            width: 250px;
            height: 250px;
            border: 2px solid transparent;
            border-top: 2px solid #00f2ff;
            border-bottom: 2px solid #7000ff;
            border-radius: 50%;
            animation: spin 3s linear infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2), inset 0 0 20px rgba(112, 0, 255, 0.2);
        }

        .core {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #1a1a1a 0%, #000 70%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 2s ease-in-out infinite;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .symbol {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(45deg, #00f2ff, #7000ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .status-text {
            margin-top: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.5);
            animation: flicker 4s infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.3; }
        }

        .particles {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="apex-ring">
            <div class="core">
                <div class="symbol">APEX</div>
            </div>
        </div>
        <div class="status-text">Système Actif : Hybrid-Sync</div>
    </div>

</body>
</html>
